<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flota MVP" />
  <title>Flota MVP</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a73e8;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 20px;
    }

    h1 {
      color: white;
      font-size: 28px;
      font-weight: 600;
    }

    p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-top: 8px;
    }

    .spinner {
      margin-top: 36px;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img src="icons/icon-192.png" alt="Flota MVP" onerror="this.style.display='none'" />
  <h1>Flota MVP</h1>
  <p>Abriendo la app...</p>
  <div class="spinner"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    // Redirigir a AppSheet tras mostrar el splash
    setTimeout(() => {
      window.location.replace('https://www.appsheet.com/start/427b44b3-254b-46e7-9cd4-cfc721296bfa');
    }, 1200);
  </script>
</body>
</html>
