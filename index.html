<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <meta name="description" content="Flota MVP - Gestión de flotas de vehículos">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flota MVP">
  <title>Flota MVP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1565C0; }
    #loading {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1565C0; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 10; transition: opacity 0.5s;
    }
    #loading h1 { font-size: 28px; margin-bottom: 12px; }
    #loading p { font-size: 14px; opacity: 0.8; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe {
      width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Flota MVP</h1>
    <p>Cargando aplicación...</p>
  </div>
  <iframe 
    id="appframe"
    src="https://www.appsheet.com/newshortcut/427b44b3-254b-46e7-9cd4-cfc721296bfa"
    allow="geolocation; camera; microphone"
    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"
  ></iframe>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/flotamvp/sw.js').then(() => {
        console.log('Service Worker registered');
      });
    }
    document.getElementById('appframe').addEventListener('load', () => {
      const loading = document.getElementById('loading');
      loading.style.opacity = '0';
      setTimeout(() => loading.style.display = 'none', 500);
    });
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading.style.display !== 'none') {
        loading.style.opacity = '0';
        setTimeout(() => loading.style.display = 'none', 500);
      }
    }, 5000);
  </script>
</body>
</html>
