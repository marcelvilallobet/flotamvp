<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flota MVP" />
  <title>Flota MVP</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a73e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #1a73e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.4s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 20px;
    }

    #splash h1 {
      color: white;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    #splash p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-top: 8px;
    }

    .spinner {
      margin-top: 40px;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #app-frame {
      width: 100%;
      flex: 1;
      border: none;
      display: block;
    }

    #offline-banner {
      display: none;
      background: #f44336;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="splash">
    <img src="icons/icon-192.png" alt="Flota MVP" onerror="this.style.display='none'" />
    <h1>Flota MVP</h1>
    <p>Cargando...</p>
    <div class="spinner"></div>
  </div>

  <div id="offline-banner">Sin conexion - algunas funciones pueden no estar disponibles</div>

  <iframe
    id="app-frame"
    src="https://www.appsheet.com/start/427b44b3-254b-46e7-9cd4-cfc721296bfa"
    allow="camera; microphone; geolocation; fullscreen"
    allowfullscreen
  ></iframe>

  <script>
    const splash = document.getElementById('splash');
    const frame = document.getElementById('app-frame');
    const offlineBanner = document.getElementById('offline-banner');

    // Ocultar splash cuando carga el iframe
    frame.addEventListener('load', () => {
      setTimeout(() => splash.classList.add('hidden'), 600);
    });

    // Fallback por si el iframe tarda mucho
    setTimeout(() => splash.classList.add('hidden'), 8000);

    // Banner offline
    window.addEventListener('offline', () => offlineBanner.style.display = 'block');
    window.addEventListener('online', () => offlineBanner.style.display = 'none');

    // Registrar service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>
</body>
</html>
