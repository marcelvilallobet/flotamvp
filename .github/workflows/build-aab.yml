name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project
        run: |
          mkdir twa-build && cd twa-build
          echo "n" | bubblewrap init \
            --manifest https://gleeful-pie-dc95f0.netlify.app/manifest.json \
            --directory .

      - name: Build AAB
        run: |
          cd twa-build
          echo "n" | bubblewrap build --skipPwaValidation

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: flota-mvp-aab
          path: twa-build/app-release-bundle.aab
          if-no-files-found: warn

      - name: Upload APK (test)
        uses: actions/upload-artifact@v4
        with:
          name: flota-mvp-apk
          path: twa-build/app-release-unsigned.apk
          if-no-files-found: warn
